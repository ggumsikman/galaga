<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Galaga Shooter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111; /* 약간 어두운 회색으로 전체 배경 설정 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            flex-direction: column;
            font-family: 'Courier New', Courier, monospace;
        }
        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        #touchControls {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-top: 15px;
            gap: 10px;
        }
        #touchControls button {
            background-color: #333;
            color: #00ff88;
            border: 2px solid #555;
            border-radius: 8px;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation; /* 모바일 브라우저 더블탭 확대/스크롤 방지 */
            flex: 1;
            font-family: 'Courier New', Courier, monospace;
        }
        #touchControls button:active {
            background-color: #555;
        }
        #btnFire {
            flex: 2; /* 무기 발사 버튼은 좌우버튼보다 2배 넓게 */
            color: #ffdd00 !important;
            border-color: #886600 !important;
        }
        
        /* 모바일 화면 대응 (창 너비 제한) */
        @media (max-width: 420px) {
            #gameCanvas {
                width: 100vw;
                height: auto;
                max-height: 70vh;
                border-left: none;
                border-right: none;
                border-radius: 0;
            }
            #touchControls {
                width: 100%;
                padding: 0 10px;
                box-sizing: border-box;
            }
        }
        #gameCanvas {
            background-color: black; /* 캔버스 바깥은 검은색(우주) */
            border: 4px solid #555; /* 레트로 스타일 회색 테두리 */
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1), inset 0 0 10px rgba(255, 255, 255, 0.05);
            outline: 2px solid #222;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="touchControls">
        <button id="btnLeft">◀</button>
        <button id="btnFire">FIRE</button>
        <button id="btnRight">▶</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- [배경 효과: 별] ---
    const stars = [];
    const numStars = 50;

    for (let i = 0; i < numStars; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 1, // 1~3px
            speed: Math.random() * 2 + 1 // 떨어지는 속도
        });
    }

    // --- [플레이어 우주선] ---
    const player = {
        x: canvas.width / 2,     // 가로 중앙
        y: canvas.height - 60,   // 바닥에서 60px 위
        width: 30,               // 삼각형 렌더링을 위한 너비/높이 기준값
        height: 30,
        speed: 5,                // 이동 속도 (5px)
        color: '#00ff88',        // 밝은 녹색
        dx: 0,                   // 현재 X축 이동 방향 및 속도
        invincibleUntil: 0       // 무적 시간(종료 시각)
    };

    // --- [사운드 시스템] ---
    let audioCtx;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playShootSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playExplosionSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);

        const bufferSize = audioCtx.sampleRate * 0.3;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = buffer;
        const noiseFilter = audioCtx.createBiquadFilter();
        noiseFilter.type = 'lowpass';
        noiseFilter.frequency.value = 1000;
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        noiseSource.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);
        noiseSource.start();
    }

    function playWaveClearSound() {
        if (!audioCtx) return;
        const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
        const step = 0.5 / notes.length;
        notes.forEach((freq, idx) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const startTime = audioCtx.currentTime + idx * step;
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.1, startTime + step * 0.2);
            gain.gain.linearRampToValueAtTime(0, startTime + step);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(startTime);
            osc.stop(startTime + step);
        });
    }

    function playGameOverSound() {
        if (!audioCtx) return;
        const notes = [392.00, 329.63, 261.63]; // G4, E4, C4
        const step = 1.0 / notes.length;
        notes.forEach((freq, idx) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const startTime = audioCtx.currentTime + idx * step;
            osc.type = 'triangle';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.1, startTime + step * 0.2);
            gain.gain.linearRampToValueAtTime(0, startTime + step);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(startTime);
            osc.stop(startTime + step);
        });
    }

    // --- [게임 상태 및 파티클] ---
    let score = 0;
    let scorePulse = 0; // 점수 폰트 크기 펌핑용
    let highScore = parseInt(localStorage.getItem('galagaHighScore')) || 0;
    let isNewRecord = false;

    function onGameOver() {
        playGameOverSound();
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('galagaHighScore', highScore);
            isNewRecord = true;
        }
    }
    let lives = 3;
    let wave = 1;
    let baseEnemySpeed = 1;
    let waveClearTimer = 0;
    let waveDisplayTimer = Date.now() + 2000; // 게임 시작 및 새 웨이브 시 알림 표시 타이머

    let comboCount = 0;
    let lastKillTime = 0;
    let comboDisplayTimer = 0;

    const particles = [];

    // --- [총알] ---
    const bullets = [];
    let lastFireTime = 0;
    const fireCooldown = 200; // 0.2초 쿨다운

    const enemyBullets = [];
    let nextEnemyFireTime = 0;

    // --- [적 비행기] ---
    let enemies = [];
    const enemyRows = 3;
    const enemyCols = 5;
    const enemyWidth = 20;
    const enemyHeight = 20;

    let enemyDirection = 1; // 1: 오른쪽, -1: 왼쪽
    let enemySpeed = 1;     // 속도 1px

    function spawnEnemies() {
        enemies = [];
        enemyDirection = 1;
        enemySpeed = baseEnemySpeed;
        nextEnemyFireTime = Date.now() + 1000 + Math.random() * 2000;

        if (wave % 5 === 0) {
            // 보스 웨이브
            enemies.push({
                x: canvas.width / 2 - 50,
                y: 60,
                width: 100,
                height: 60,
                color: '#ff0055',
                alive: true,
                scoreValue: 1000,
                hp: 30,
                maxHp: 30, // 체력바 렌더링을 위한 최대 체력
                isBoss: true
            });
        } else {
            // 일반 웨이브 적 배치
            for (let row = 0; row < enemyRows; row++) {
                for (let col = 0; col < enemyCols; col++) {
                    let sVal = 50;
                    if (row === 0) sVal = 150;
                    else if (row === 1) sVal = 100;

                    enemies.push({
                        x: col * 60 + 60,
                        y: row * 50 + 60,
                        width: enemyWidth,
                        height: enemyHeight,
                        color: '#9966ff',
                        alive: true,
                        scoreValue: sVal,
                        hp: 1, // 일반 적 체력
                        isBoss: false
                    });
                }
            }
        }
    }

    // 적 비행기 초기 배치
    spawnEnemies();

    // --- 키보드 이벤트 리스너 ---
    const keys = {
        ArrowLeft: false,
        ArrowRight: false,
        ' ': false // 스페이스바
    };

    document.addEventListener('keydown', (e) => {
        initAudio(); // 첫 조작 시 오디오 활성화
        if (keys.hasOwnProperty(e.key)) {
            keys[e.key] = true;
        }
    });

    document.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.key)) {
            keys[e.key] = false;
        }
    });

    // --- 터치 가상 버튼 연결 ---
    function bindButton(btnId, keyName) {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        
        const press = (e) => {
            e.preventDefault();
            initAudio(); // 버튼 터치 시 오디오 컨텍스트 초기화
            keys[keyName] = true;
        };
        const release = (e) => {
            e.preventDefault();
            keys[keyName] = false;
        };

        // 모바일 터치 이벤트
        btn.addEventListener('touchstart', press, { passive: false });
        btn.addEventListener('touchend', release, { passive: false });
        btn.addEventListener('touchcancel', release, { passive: false });

        // PC 마우스 클릭(터치 에뮬레이션 용도)
        btn.addEventListener('mousedown', press);
        btn.addEventListener('mouseup', release);
        btn.addEventListener('mouseleave', release);
    }

    bindButton('btnLeft', 'ArrowLeft');
    bindButton('btnRight', 'ArrowRight');
    bindButton('btnFire', ' ');

    function fireBullet() {
        if (lives <= 0) return; // 죽었을 때 조작 불가
        const currentTime = Date.now();
        if (currentTime - lastFireTime >= fireCooldown) {
            playShootSound();
            bullets.push({
                x: player.x - 2, // 가로 4px이므로 중앙 정렬을 위해 -2
                y: player.y - player.height / 2, // 우주선 상단
                width: 4,
                height: 12
            });
            lastFireTime = currentTime;
        }
    }

    // --- 충돌 및 파티클, UI 함수들 ---
    function checkCollision(a, b) {
        return a.x < b.x + b.width &&
               a.x + a.width > b.x &&
               a.y < b.y + b.height &&
               a.y + a.height > b.y;
    }

    function createExplosion(x, y, color) {
        playExplosionSound();
        const numParticles = Math.floor(Math.random() * 4) + 5; // 5~8개 파티클
        for (let i = 0; i < numParticles; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 6, // 사방으로 퍼짐
                vy: (Math.random() - 0.5) * 6,
                life: 1.0, // 수명 (1.0 -> 0)
                color: color
            });
        }
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.05; // 프레임당 수명 감소
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    function drawParticles() {
        particles.forEach(p => {
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0;
    }

    function checkAllCollisions() {
        const now = Date.now();

        // 1. 총알 vs 적
        for (let i = bullets.length - 1; i >= 0; i--) {
            for (let j = enemies.length - 1; j >= 0; j--) {
                if (enemies[j].alive && checkCollision(bullets[i], enemies[j])) {
                    enemies[j].hp--; // 체력 감소
                    bullets.splice(i, 1); // 해당 총알 제거

                    if (enemies[j].hp <= 0) {
                        enemies[j].alive = false; // 적 죽음
                        // 파티클 생성 (적의 중앙)
                        createExplosion(enemies[j].x + enemies[j].width / 2, enemies[j].y + enemies[j].height / 2, enemies[j].color);
                        
                        // --- 콤보 로직 ---
                        if (now - lastKillTime <= 2000) {
                            comboCount++;
                        } else {
                            comboCount = 1; // 2초 지나면 1콤보부터
                        }
                        lastKillTime = now;

                        let multiplier = 1;
                        if (comboCount >= 10) multiplier = 3;
                        else if (comboCount >= 5) multiplier = 2;
                        else if (comboCount >= 3) multiplier = 1.5;

                        if (comboCount >= 3) {
                            comboDisplayTimer = now + 1000; // 1초간 화면에 콤보 표시
                        }

                        score += Math.floor(enemies[j].scoreValue * multiplier);
                        scorePulse = 10; // 점수 텍스트 펌핑 효과
                    } else {
                        // 피격 이펙트 (보스 등의 경우 체력만 깎일 때)
                        let hitX = enemies[j].x + Math.random() * enemies[j].width;
                        let hitY = enemies[j].y + enemies[j].height; // 하단 위치 주변
                        createExplosion(hitX, hitY, '#ffffff'); // 소규모 타격 파티클
                    }

                    break; // 총알 하나는 한 번만 충돌
                }
            }
        }

        // 2. 적/적 총알 vs 플레이어
        if (lives > 0 && now > player.invincibleUntil) {
            // 플레이어 충돌 박스
            const playerBox = {
                x: player.x - player.width / 2,
                y: player.y - player.height / 2,
                width: player.width,
                height: player.height
            };

            // 적 총알 vs 플레이어 확인
            for (let k = enemyBullets.length - 1; k >= 0; k--) {
                if (checkCollision(playerBox, enemyBullets[k])) {
                    createExplosion(playerBox.x + playerBox.width / 2, playerBox.y + playerBox.height / 2, '#ff4444');
                    enemyBullets.splice(k, 1);
                    
                    lives--;
                    if (lives <= 0) onGameOver();
                    comboCount = 0;
                    player.invincibleUntil = now + 2000;
                    break;
                }
            }

            // 아직 무적이 아니라면 (위에서 총알 안 맞았으면) 적 본체 충돌 확인
            if (now > player.invincibleUntil) {
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (enemies[j].alive && checkCollision(playerBox, enemies[j])) {
                        enemies[j].alive = false; // 충돌한 적 사라짐
                        createExplosion(enemies[j].x + enemies[j].width / 2, enemies[j].y + enemies[j].height / 2, enemies[j].color);
                        
                        lives--; // 생명 -1
                        if (lives <= 0) onGameOver();
                        comboCount = 0;
                        player.invincibleUntil = now + 2000; // 2초간 무적 적용
                        break;
                    }
                }
            }
        }

        // 3. 웨이브 클리어 체크
        if (waveClearTimer === 0) {
            const anyAlive = enemies.some(e => e.alive);
            if (!anyAlive && enemies.length > 0) {
                // 적이 전부 죽었음
                playWaveClearSound();
                waveClearTimer = now + 2000; // 2초 후에 웨이브 시작
            }
        }
    }

    function drawUI() {
        const now = Date.now();

        // 점수 펌핑 효과
        const scoreFontSize = 20 + scorePulse;
        if (scorePulse > 0) scorePulse -= 0.5; // 서서히 줄어듦
        
        ctx.fillStyle = 'white';
        ctx.font = `bold ${scoreFontSize}px "Courier New", Courier, monospace`;
        ctx.textAlign = 'left';
        ctx.fillText(`SCORE: ${score}`, 10, 30);
        
        // 생명을 하트 기호로 표시
        let heartsStr = "";
        for (let i = 0; i < lives; i++) heartsStr += "♥";
        
        ctx.font = '24px "Courier New", Courier, monospace';
        ctx.textAlign = 'right';
        ctx.fillStyle = '#ff4444'; // 빨간색
        ctx.fillText(heartsStr, canvas.width - 10, 30);

        // 콤보 텍스트 표시
        if (now < comboDisplayTimer) {
            ctx.fillStyle = '#ffdd00';
            ctx.font = 'bold 30px "Courier New", Courier, monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`${comboCount} COMBO!`, canvas.width / 2, canvas.height / 2 - 40);
        }

        // 웨이브 클리어 표시
        if (waveClearTimer > 0) {
            ctx.fillStyle = '#00ff88';
            ctx.font = 'bold 35px "Courier New", Courier, monospace';
            ctx.textAlign = 'center';
            ctx.fillText("WAVE CLEAR!", canvas.width / 2, canvas.height / 2);
        }

        // 새 웨이브 시작 알림 표시
        if (waveDisplayTimer > now) {
            ctx.textAlign = 'center';
            if (wave % 5 === 0) {
                ctx.fillStyle = '#ff0055'; // 보스 경고
                ctx.font = 'bold 35px "Courier New", Courier, monospace';
                ctx.fillText(`WARNING: BOSS WAVE ${wave}`, canvas.width / 2, canvas.height / 2 - 20);
                if (Math.floor(now / 150) % 2 === 0) {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 20px "Courier New", Courier, monospace';
                    ctx.fillText("PREPARE FOR BATTLE", canvas.width / 2, canvas.height / 2 + 20);
                }
            } else {
                ctx.fillStyle = '#00ffff'; // 일반 웨이브 (시안색)
                ctx.font = 'bold 45px "Courier New", Courier, monospace';
                ctx.fillText(`WAVE ${wave}`, canvas.width / 2, canvas.height / 2);
            }
        }

        // 게임 오버시
        if (lives <= 0) {
            ctx.fillStyle = 'red';
            ctx.font = 'bold 40px "Courier New", Courier, monospace';
            ctx.textAlign = 'center';
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);

            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px "Courier New", Courier, monospace';
            ctx.fillText(`HIGH SCORE: ${highScore}`, canvas.width / 2, canvas.height / 2 + 20);

            if (isNewRecord) {
                if (Math.floor(Date.now() / 300) % 2 === 0) {
                    ctx.fillStyle = '#ffdd00';
                    ctx.fillText("NEW RECORD!", canvas.width / 2, canvas.height / 2 + 50);
                }
            }
        }
    }

    // --- 그리기 및 업데이트 함수들 ---

    function drawStars() {
        ctx.fillStyle = 'white';
        stars.forEach(star => {
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function updateStars() {
        stars.forEach(star => {
            star.y += star.speed; // 아래로 이동
            
            // 화면 아래로 나가면 위에서 다시 시작
            if (star.y > canvas.height) {
                star.y = 0;
                star.x = Math.random() * canvas.width;
            }
        });
    }

    function drawBullets() {
        // 총알 발광 효과
        ctx.shadowColor = '#ffdd00';
        ctx.shadowBlur = 10;
        ctx.fillStyle = '#ffdd00';

        bullets.forEach(bullet => {
            ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
        });

        // 다른 요소 그릴 때 발광 효과 제거 (초기화)
        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';
    }

    function updateBullets() {
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].y -= 8; // 매 프레임 위로 8px 이동

            // 화면 위로 나간 총알 제거
            if (bullets[i].y < 0) {
                bullets.splice(i, 1);
            }
        }
    }

    function drawEnemyBullets() {
        ctx.shadowColor = '#ff4444';
        ctx.shadowBlur = 10;
        ctx.fillStyle = '#ff4444';

        enemyBullets.forEach(b => {
            ctx.fillRect(b.x, b.y, b.width, b.height);
        });

        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';
    }

    function updateEnemyBullets() {
        const now = Date.now();
        // 발사 간격 체크
        if (now > nextEnemyFireTime) {
            const aliveEnemies = enemies.filter(e => e.alive);
            if (aliveEnemies.length > 0) {
                const shooter = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
                
                if (shooter.isBoss) {
                    for (let ang = -1; ang <= 1; ang++) {
                        enemyBullets.push({
                            x: shooter.x + shooter.width / 2 - 2, // 중앙 정렬
                            y: shooter.y + shooter.height,
                            width: 6,
                            height: 12,
                            speed: 4,
                            vx: ang * 2, // 3방향 속도 분산 방사
                            color: '#ff0055' // 보스 총알 색상
                        });
                    }
                    nextEnemyFireTime = now + 800 + Math.random() * 1000; // 보스 쿨다운 (더 빠름)
                } else {
                    enemyBullets.push({
                        x: shooter.x + shooter.width / 2 - 2,
                        y: shooter.y + shooter.height,
                        width: 4,
                        height: 12,
                        speed: 4,
                        vx: 0,
                        color: '#ff4444'
                    });
                    nextEnemyFireTime = now + 1000 + Math.random() * 2000; // 일반 쿨다운 1~3초
                }
            }
        }

        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            enemyBullets[i].y += enemyBullets[i].speed; // 아래로 이동 속도
            if (enemyBullets[i].vx) {
                enemyBullets[i].x += enemyBullets[i].vx; // 대각선 발사 시 X축 가감
            }
            
            // 화면 밖으로 나간 경우 삭제 처리 (왼쪽, 오른쪽, 아래)
            if (enemyBullets[i].y > canvas.height || enemyBullets[i].x < 0 || enemyBullets[i].x > canvas.width) {
                enemyBullets.splice(i, 1);
            }
        }
    }

    function drawPlayer() {
        if (lives <= 0) return; // 게임 오버 시 우주선 안보이게 처리
        
        // 무적 시간 깜빡임 효과
        if (Date.now() < player.invincibleUntil) {
            if (Math.floor(Date.now() / 150) % 2 === 0) return;
        }

        ctx.fillStyle = player.color;
        ctx.beginPath();
        // 삼각형 그리기
        ctx.moveTo(player.x, player.y - player.height / 2); // 위쪽 뾰족한 부분
        ctx.lineTo(player.x - player.width / 2, player.y + player.height / 2); // 왼쪽 아래
        ctx.lineTo(player.x + player.width / 2, player.y + player.height / 2); // 오른쪽 아래
        ctx.closePath();
        ctx.fill();
    }

    function updatePlayer() {
        if (lives <= 0) return; // 게임 오버 시 조작 불가

        // 기존 dx 대신 keys 상태를 기반으로 이동하여 더 부드러운 조작 지원
        if (keys.ArrowLeft) player.x -= player.speed;
        if (keys.ArrowRight) player.x += player.speed;
        
        // 스페이스바로 총알 발사
        if (keys[' ']) fireBullet();

        // 경계선 처리 (화면 밖으로 나가지 못하게)
        if (player.x - player.width / 2 < 0) {
            player.x = player.width / 2;
        }
        if (player.x + player.width / 2 > canvas.width) {
            player.x = canvas.width - player.width / 2;
        }
    }

    function drawEnemies() {
        enemies.forEach(enemy => {
            if (!enemy.alive) return; // 죽은 적은 그리지 않음

            if (enemy.isBoss) {
                // 보스 외형 렌더링
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.strokeRect(enemy.x, enemy.y, enemy.width, enemy.height);

                // 보스 눈 (분노한 눈매)
                ctx.fillStyle = '#ffdd00';
                ctx.beginPath();
                ctx.moveTo(enemy.x + 20, enemy.y + 20);
                ctx.lineTo(enemy.x + 40, enemy.y + 25);
                ctx.lineTo(enemy.x + 20, enemy.y + 30);
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(enemy.x + enemy.width - 20, enemy.y + 20);
                ctx.lineTo(enemy.x + enemy.width - 40, enemy.y + 25);
                ctx.lineTo(enemy.x + enemy.width - 20, enemy.y + 30);
                ctx.fill();
                
                // 보스 코어 (중앙 코어 빛)
                ctx.fillStyle = '#00ffff';
                ctx.beginPath();
                ctx.arc(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2 + 10, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // 체력바 (HP Bar) 렌더링
                const hpPercent = Math.max(0, enemy.hp / enemy.maxHp);
                ctx.fillStyle = 'red';
                ctx.fillRect(enemy.x, enemy.y - 15, enemy.width, 5);
                ctx.fillStyle = '#00ff88';
                ctx.fillRect(enemy.x, enemy.y - 15, enemy.width * hpPercent, 5);
            } else {
                ctx.fillStyle = '#9966ff'; // 적 기본 색상
                ctx.strokeStyle = '#9966ff'; // 선 색상

                // 본체 (사각형)
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                
                // 더듬이
                ctx.beginPath();
                ctx.lineWidth = 2;
                
                // 왼쪽 더듬이
                ctx.moveTo(enemy.x + 4, enemy.y);
                ctx.lineTo(enemy.x + 4, enemy.y - 8);
                
                // 오른쪽 더듬이
                ctx.moveTo(enemy.x + enemy.width - 4, enemy.y);
                ctx.lineTo(enemy.x + enemy.width - 4, enemy.y - 8);
                
                ctx.stroke();
            }
        });
    }

    function updateEnemies() {
        let hitWall = false;

        // 적 이동 및 벽 충돌 체크
        for (let i = 0; i < enemies.length; i++) {
            const enemy = enemies[i];
            if (!enemy.alive) continue; // 죽은 적은 이동/충돌 검사 제외

            enemy.x += enemySpeed * enemyDirection;

            // 오른쪽 또는 왼쪽 벽에 닿았는지 확인
            if (enemy.x + enemy.width > canvas.width || enemy.x < 0) {
                hitWall = true;
            }
        }

        // 벽에 닿은 경우 처리
        if (hitWall) {
            enemyDirection *= -1; // 방향 반전
            
            enemies.forEach(enemy => {
                if (!enemy.alive) return; // 죽은 적은 아래로 안내려옴
                enemy.y += 20; // 20px 한 줄 아래로 내려옴
                
                // 방향을 바꾼 후, 즉시 충돌 영역에서 벗어나게 약간 이동시킴
                // (이 작업을 안하면 벽에서 무한 방향전환 버그 발생 가능)
                enemy.x += enemySpeed * enemyDirection * 2;
            });
        }
    }

    // --- [게임 루프] ---
    function gameLoop() {
        // 웨이브 전환 대기 처리
        if (waveClearTimer > 0 && Date.now() > waveClearTimer) {
            wave++;
            baseEnemySpeed += 0.3; // 웨이브 상승시 적 이동 속도 0.3 증가
            spawnEnemies(); // 적 재배치
            waveClearTimer = 0;
            bullets.length = 0; // 남은 총알 지우기
            enemyBullets.length = 0; // 적 총알 지우기
            waveDisplayTimer = Date.now() + 2000; // 새 웨이브 알림 2초간 표시
        }

        // 1. 화면 지우기
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 2. 배경 효과 업데이트 및 그리기
        updateStars();
        drawStars();

        // 3. 적 우주선 업데이트 및 그리기
        updateEnemies();
        drawEnemies();

        // 4. 플레이어 우주선 업데이트 및 그리기
        updatePlayer();
        drawPlayer();

        // 5. 총알 업데이트 및 그리기
        updateBullets();
        drawBullets();
        updateEnemyBullets();
        drawEnemyBullets();

        // 6. 충돌 검사 및 UI, 파티클 처리
        checkAllCollisions();
        updateParticles();
        drawParticles();
        drawUI();

        // 다음 프레임 요청
        requestAnimationFrame(gameLoop);
    }

    // 게임 시작
    requestAnimationFrame(gameLoop);

</script>
